server {
    listen 443 ssl;
    listen 2053 ssl;
    listen 2083 ssl;
    listen 2087 ssl;
    listen 2096 ssl;
    listen 8443 ssl;
    http2 on;
    server_name account.js.gripe;

    ssl_certificate     /etc/openresty/ssl/js.gripe.fullchain.pem;
    ssl_certificate_key /etc/openresty/ssl/js.gripe.key.pem;

    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    charset utf-8;
    server_tokens off;
    root /opt/account-system/public;

    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store" always;
        return 204;
    }

    location = /api/v1/myaccount/healthz {
        access_log off;
        add_header Cache-Control "no-store" always;
        return 204;
    }

    location = / {
        if ($openstry_probe_request) {
            return 204;
        }
        if ($openstry_head_probe) {
            return 204;
        }
        return 302 /login;
    }

    location = /admin {
        return 404;
    }

    location = /admin.html {
        return 404;
    }

    location = /login.html {
        return 302 /login;
    }

    location = /dashboard.html {
        return 302 /dashboard;
    }

    location = /setup {
        return 302 /login;
    }

    location ~* ^/(?:app\.js|styles\.css|privacy-plugin-loader\.js|privacy-plugin-banner\.css)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        if ($openstry_probe_request) {
            return 204;
        }
        if ($openstry_head_probe) {
            return 204;
        }
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "browsing-topics=(), join-ad-interest-group=(), run-ad-auction=()" always;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_pass http://127.0.0.1:9100;
        proxy_connect_timeout 1s;
        proxy_send_timeout 6s;
        proxy_read_timeout 6s;
    }
}

server {
    listen 80;
    server_name account.js.gripe;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
